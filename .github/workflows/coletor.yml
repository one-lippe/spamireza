name: Coletor CWL Spamireza

on:
  schedule:
    - cron: '*/10 * * * *'   # a cada 10 minutos
  workflow_dispatch: {}        # botão pra rodar na hora, manualmente

permissions:
  contents: write

concurrency:
  group: coletor
  cancel-in-progress: false

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rodar coletor
        env:
          COC_TOKEN: ${{ secrets.COC_TOKEN }}
        run: python3 coletor_cwl.py

      - name: Commitar se houver mudança
        run: |
          git config user.name "coletor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "Nada mudou — sem commit."
            exit 0
          fi
          git commit -m "auto: atualiza CWL [skip ci]"
          for i in 1 2 3 4 5; do
            if git push origin HEAD:main; then echo "push ok"; exit 0; fi
            echo "push colidiu (tentativa $i) — re-sincronizando com o remoto..."
            git fetch origin main
            git reset --soft origin/main
            git add index.html
            git diff --cached --quiet || git commit -m "auto: atualiza CWL [skip ci]"
            sleep $((i * 3))
          done
          echo "Falhou apos varias tentativas."; exit 1
