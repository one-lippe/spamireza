name: Coletor CWL Spamireza

on:
  schedule:
    - cron: '*/10 * * * *'   # a cada 10 minutos
  workflow_dispatch: {}        # botão pra rodar na hora, manualmente

permissions:
  contents: write

concurrency:
  group: coletor
  cancel-in-progress: false

jobs:
  coletar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rodar coletor
        env:
          COC_TOKEN: ${{ secrets.COC_TOKEN }}
        run: python3 coletor_cwl.py

      - name: Commitar se houver mudança
        run: |
          git config user.name "coletor-bot"
          git config user.email "actions@users.noreply.github.com"
          # guarda só os arquivos gerados (nunca toca em .github/workflows)
          cp index.html /tmp/index.html
          rm -rf /tmp/historico; [ -d historico ] && cp -r historico /tmp/historico || true
          for i in 1 2 3 4 5; do
            git fetch --quiet origin main
            git reset --hard --quiet origin/main           # base limpa = exatamente o remoto
            cp /tmp/index.html index.html                  # sobrepõe só os dados
            [ -d /tmp/historico ] && { mkdir -p historico && cp -r /tmp/historico/. historico/; } || true
            git add index.html historico 2>/dev/null || git add index.html
            if git diff --cached --quiet; then echo "nada mudou"; exit 0; fi
            git commit --quiet -m "auto: atualiza CWL"
            if git push --quiet origin HEAD:main; then echo "push ok"; exit 0; fi
            echo "push colidiu (tentativa $i), re-sincronizando..."; sleep $((i * 2))
          done
          echo "falhou apos varias tentativas"; exit 1
