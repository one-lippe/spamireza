name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

# cada deploy novo cancela o anterior em andamento — nunca empaca fila
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Montar site (só o que é público)
        run: |
          rm -rf _site && mkdir _site
          cp index.html _site/index.html
          mkdir -p _site/ARTES
          for f in bg.jpg FAISCAS.png; do [ -f "ARTES/$f" ] && cp "ARTES/$f" "_site/ARTES/$f" || true; done
          touch _site/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
