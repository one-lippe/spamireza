<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Spamireza · Liga de Julho/26</title>
<style>
  :root{
    --navy:#081a30; --navy2:#0b2545; --card:#0f2b4d; --card2:#13355f;
    --line:#1e4574; --gold:#e8b94a; --gold-soft:#f2d383;
    --ink:#eaf2fb; --muted:#8fa8c7; --muted2:#6d87a8;
    --green:#28a86a; --red:#e05260;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 50% -10%,#12335c 0%,var(--navy) 55%,#050f1d 100%);
    color:var(--ink);min-height:100vh;padding:0 0 40px;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:760px;margin:0 auto;padding:0 14px}
  header{text-align:center;padding:24px 14px 12px}
  .crest{width:60px;height:60px;margin:0 auto 10px;border-radius:18px;
    background:linear-gradient(160deg,var(--gold) 0%,#b9862a 100%);
    display:flex;align-items:center;justify-content:center;font-size:30px;
    box-shadow:0 8px 24px rgba(232,185,74,.28)}
  header h1{font-size:26px;font-weight:800;letter-spacing:.5px;
    background:linear-gradient(90deg,var(--gold-soft),var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  header .sub{color:var(--muted);font-size:12.5px;margin-top:4px;letter-spacing:.3px}
  .prep{display:inline-block;margin-top:10px;font-size:10.5px;letter-spacing:.5px;color:var(--gold-soft);
    border:1px solid var(--line);padding:4px 11px;border-radius:20px;background:rgba(232,185,74,.06)}

  .tabs{display:flex;gap:8px;overflow-x:auto;padding:8px 2px 12px;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;padding:9px 15px;border-radius:12px;border:1px solid var(--line);
    background:var(--card);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.18s}
  .tab .n{font-size:10px;color:var(--muted2);display:block;font-weight:700;letter-spacing:1px}
  .tab.active{background:linear-gradient(160deg,var(--gold) 0%,#c8922e 100%);color:#20140a;border-color:var(--gold);
    box-shadow:0 6px 18px rgba(232,185,74,.25)}
  .tab.active .n{color:#5c3e12}
  .tab.locked{opacity:.4;cursor:not-allowed;filter:grayscale(.3)}

  .clanhead{border:1px solid var(--line);border-radius:16px;padding:14px 16px;margin:4px 0 14px;
    background:linear-gradient(120deg,var(--card2),var(--card))}
  .clanhead h2{font-size:18px;font-weight:800}
  .clanhead .vs{color:var(--muted);font-size:12.5px;margin-top:3px}
  .clanhead .vs b{color:var(--gold-soft)}
  .counts{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
  .pill{font-size:11px;font-weight:700;padding:5px 11px;border-radius:20px;border:1px solid var(--line)}
  .pill.esc{color:#bff0d5;background:rgba(40,168,106,.14);border-color:rgba(40,168,106,.5)}
  .pill.res{color:#f2c3c7;background:rgba(224,82,96,.12);border-color:rgba(224,82,96,.45)}

  .divider{display:flex;align-items:center;gap:10px;margin:16px 2px 10px;color:var(--muted2);
    font-size:11px;font-weight:800;letter-spacing:1.5px}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--line)}

  .list{display:flex;flex-direction:column;gap:7px}
  .p{display:flex;align-items:center;gap:12px;padding:10px 13px;border-radius:12px;
    background:var(--card);border:1px solid var(--line)}
  .p.res{opacity:.72;border-style:dashed}
  .pos{flex:0 0 30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:13px;background:var(--card2);border:1px solid var(--line);color:var(--gold-soft)}
  .p.res .pos{color:var(--muted2);background:transparent}
  .pname{flex:1;font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .badge{font-size:9.5px;font-weight:800;letter-spacing:.5px;padding:4px 9px;border-radius:7px;flex:0 0 auto}
  .badge.esc{background:rgba(40,168,106,.9);color:#04150c}
  .badge.res{background:#2b4870;color:var(--muted)}

  .foot{text-align:center;color:var(--muted2);font-size:11px;margin-top:22px;line-height:1.7}
  @media(min-width:620px){ header h1{font-size:30px} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="crest">⚔️</div>
    <h1>SPAMIREZA</h1>
    <div class="sub">Campeonato Interno · Liga de Julho/26</div>
    <div class="prep">◆ DIA DE PREPARAÇÃO · ESCALAÇÃO</div>
  </header>

  <div class="tabs" id="tabs"></div>
  <div id="clanhead"></div>
  <div class="list" id="list"></div>

  <div class="foot">
    Escalados = vilas na line da guerra atual · Reservas = convocados fora da line.<br>
    Estatísticas de ataque e defesa entram após a 1ª guerra.
  </div>
</div>

<script>
const CLANS={
 1:{nome:"SpamiReza",vs:"ÄVÈÑGÈRS 2.0",tam:"15 x 15",
    esc:["Marinaul war","SR · Giovanelli","SR · Jon Snow 2","tozim","Henrique Nerath","KingOfBilada™","SR · Caiçara","Jan","Levi_Neiva","SR · Thiago","Nesk","MAJOR FIV3","Reikan","linch","GENERAL ZOD"],
    res:["SR · InTheDark☆","LUMINOUS"]},
 2:{nome:"RezaSpamandu",vs:"حكحكأيهم",tam:"15 x 15",
    esc:["SR · Jon Snow","Tony D. Chopper","SrNunes","IGRIS™","×Darkøn×","GSAzevedo30","LEANDRO","LSWRTH","Neskau","SR . João V.","TomorrowBr","SR · Edu","SR·GOD kratos","MAJOR FIV3","PaiDeFamilia"],
    res:["menolli","Nathan♣","SR · Camburi"]},
 3:{nome:"ScamiReza",vs:"MINNESOTA",tam:"30 x 30",
    esc:["Sene","Agnes","MattosxP","☆VILA DO PX ッ","Samuel Soares","SR · Pbalestra","KingMpg","nogz","nonick","Psico 2k25","Maxpaz","ROBERTHWILLIAMM","chaos","SR · The off","rei do crime","matias?","Dalton","SR · Nitzuほうめ","SR · Balestra","·Holtser Ω","SR · DuMAR","SR · GPM 2","RAKAN","SR · One☆","Duff","$ GUADIADOR $","nathan_GO$","ayumatsui","Elianin?","F4KER"],
    res:["irmão do jorel","Gameplay"]},
 4:{nome:"RezaScamandu",vs:"THE Clasher",tam:"30 x 30",
    esc:["Lider Andre","Deyvidzk","SR·Dos Ovos","Lider André 2","SR · Dennis","LigeirinhOxD","CoR1nG4 ×.×","Lider André 3","Fernandes^","NAUZIN","Nesk'","BELLION™","BERU炎","h7dek1","Ghostface","Ganso","Jan™","PaulinhoPH","Nathan TH11","SR · Chefex","SR · JotaErre","RAGNAROK","Honrado","-Meliodas-","°DAxiLHA°","Tomorrowland","☆InTheDark☆","JigSaw","Ligeirinh2xD","GSAzevedo30 #2"],
    res:["SR · Borges"]},
 5:{nome:"e-SpamiReza",vs:null,tam:null,esc:[],res:[]}
};
let active=1;

function renderTabs(){
  document.getElementById('tabs').innerHTML=[1,2,3,4,5].map(c=>{
    const locked=c===5;
    return `<div class="tab ${c===active?'active':''} ${locked?'locked':''}"
      ${locked?'':`onclick="setClan(${c})"`}><span class="n">CLÃ ${c}</span>${CLANS[c].nome}${locked?' 🔒':''}</div>`;
  }).join('');
}
function setClan(c){active=c;render();}

function render(){
  renderTabs();
  const d=CLANS[active];
  document.getElementById('clanhead').innerHTML=
    `<div class="clanhead"><h2>Clã ${active} · ${d.nome}</h2>
     <div class="vs">🗡️ vs <b>${d.vs}</b> · guerra ${d.tam}</div>
     <div class="counts">
       <span class="pill esc">▲ ${d.esc.length} escalados</span>
       <span class="pill res">${d.res.length} reservas</span>
     </div></div>`;

  let html=d.esc.map((n,i)=>
    `<div class="p"><div class="pos">${i+1}</div>
      <div class="pname">${n}</div><div class="badge esc">ESCALADO</div></div>`).join('');
  if(d.res.length){
    html+=`<div class="divider">RESERVAS</div>`;
    html+=d.res.map(n=>
      `<div class="p res"><div class="pos">R</div>
        <div class="pname">${n}</div><div class="badge res">RESERVA</div></div>`).join('');
  }
  document.getElementById('list').innerHTML=html;
}
render();
</script>
</body>
</html>
